name: CI

on:
  pull_request:
    branches: [master]
  push:
    branches: ["**"]
  workflow_dispatch:

jobs:
  ci:
    name: CI Pipeline
    runs-on: ubuntu-latest

    env:
      DATABASE_URL: ${{ secrets.DATABASE_URL }}
      DIRECT_URL: ${{ secrets.DIRECT_URL }}

    steps:
      # ── T1 : Installation & génération client Prisma ──────────────────────
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: T1 — Installer les dépendances
        run: pnpm install --frozen-lockfile

      - name: T1 — Générer le client Prisma
        run: pnpm db:generate

      # ── T2 : Schéma Prisma — validé via typecheck ─────────────────────────
      - name: T2 — Type Check (schéma + code)
        run: pnpm typecheck

      # ── T3 + T5 : Tests unitaires (withTenant + Redis mock) ───────────────
      - name: T3/T5 — Tests unitaires
        run: pnpm test run

      # ── T4 : Migrations + seed sur Neon ───────────────────────────────────
      - name: T4 — Appliquer les migrations Prisma
        run: pnpm dlx prisma migrate deploy

      - name: T4 — Seed tenant de développement
        run: pnpm db:seed

      # ── T6 : Build final ──────────────────────────────────────────────────
      - name: T6 — Build
        run: pnpm build

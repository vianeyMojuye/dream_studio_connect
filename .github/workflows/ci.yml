name: CI

on:
  pull_request:
    branches: [master]
  push:
    branches: ["**"]
  workflow_dispatch:

jobs:
  ci:
    name: CI Pipeline
    runs-on: ubuntu-latest

    env:
      DATABASE_URL: ${{ secrets.DATABASE_URL }}
      DIRECT_URL: ${{ secrets.DIRECT_URL }}
      AUTH_SECRET: ${{ secrets.AUTH_SECRET || 'ci-test-secret-32-chars-minimum!!' }}
      AUTH_URL: ${{ secrets.AUTH_URL || 'http://localhost:3000' }}
      UPSTASH_REDIS_REST_URL: ${{ secrets.UPSTASH_REDIS_REST_URL || '' }}
      UPSTASH_REDIS_REST_TOKEN: ${{ secrets.UPSTASH_REDIS_REST_TOKEN || '' }}

    steps:
      # ── T1 : Installation & génération client Prisma ──────────────────────
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: T1 — Installer les dépendances
        run: pnpm install --frozen-lockfile

      - name: T1 — Générer le client Prisma
        run: pnpm db:generate

      # ── T2 : Schéma Prisma + types Auth — validés via typecheck ───────────
      - name: T2 — Type Check (schéma + types session Auth.js)
        run: pnpm typecheck

      # ── T3 : Tests unitaires (auth, RBAC, withTenant, Redis mock) ─────────
      - name: T3 — Tests unitaires (auth + RBAC + withTenant)
        run: pnpm test run

      # ── T4 : Migrations + seed sur Neon (nécessite secrets DATABASE_URL) ──
      - name: T4 — Appliquer les migrations Prisma
        if: ${{ env.DATABASE_URL != '' }}
        run: pnpm dlx prisma migrate deploy

      - name: T4 — Seed tenant de développement
        if: ${{ env.DATABASE_URL != '' }}
        run: pnpm db:seed

      # ── T5 : Lint ─────────────────────────────────────────────────────────
      - name: T5 — Lint
        run: pnpm lint

      # ── T6 : Build final (inclut prisma generate) ─────────────────────────
      - name: T6 — Build
        run: pnpm build
